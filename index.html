<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Chatbot IA - Selecciona el modelo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 85vh;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #5a67d8 0%, #6b46c0 100%);
            color: white;
            padding: 16px 20px;
            text-align: center;
        }

        .chat-header h2 {
            font-weight: 600;
            font-size: 1.3rem;
            letter-spacing: -0.3px;
        }

        /* Selector de modelo */
        .model-selector {
            background: rgba(255,255,255,0.15);
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.85rem;
        }
        .model-selector label {
            font-weight: 500;
        }
        #modelSelect {
            flex: 1;
            padding: 8px 12px;
            border-radius: 40px;
            border: none;
            background: white;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }
        #modelStatus {
            font-size: 0.75rem;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #f9fafb;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeInUp 0.3s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            align-self: flex-end;
        }

        .bot-message {
            align-self: flex-start;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 24px;
            line-height: 1.5;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .user-message .bubble {
            background: #5a67d8;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-message .bubble {
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .bubble a {
            color: #5a67d8;
            text-decoration: underline;
            word-break: break-all;
        }

        .bubble br {
            margin-bottom: 6px;
        }

        .timestamp {
            font-size: 0.7rem;
            margin-top: 5px;
            margin-left: 12px;
            margin-right: 12px;
            color: #6c757d;
        }

        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        #userInput:focus {
            border-color: #5a67d8;
            box-shadow: 0 0 0 3px rgba(90, 103, 216, 0.2);
        }

        #sendButton {
            background: #5a67d8;
            border: none;
            color: white;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-size: 1.3rem;
        }

        #sendButton:hover {
            background: #4c51bf;
        }

        #sendButton:active {
            transform: scale(0.96);
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 18px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }

        @media (max-width: 640px) {
            .message {
                max-width: 90%;
            }
            .chat-container {
                height: 90vh;
                border-radius: 20px;
            }
            .model-selector {
                flex-direction: column;
                align-items: stretch;
            }
            #modelStatus {
                text-align: center;
            }
        }
    </style>
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h2>🤖 Asistente IA · Modelos disponibles</h2>
        <div class="model-selector">
            <label>🧠 Modelo:</label>
            <select id="modelSelect" disabled>
                <option value="">Cargando lista...</option>
            </select>
            <span id="modelStatus">⚙️ Conectando...</span>
        </div>
    </div>

    <div class="messages-area" id="messagesArea">
        <div class="message bot-message">
            <div class="bubble">
                👋 ¡Hola! Estoy cargando la lista de modelos disponibles. En unos segundos podrás elegir cuál quieres usar y conversar conmigo.
            </div>
            <div class="timestamp"></div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Escribe tu mensaje aquí..." autocomplete="off" disabled>
        <button id="sendButton" disabled>➤</button>
    </div>
</div>

<script>
    // Elementos del DOM
    const modelSelect = document.getElementById('modelSelect');
    const modelStatus = document.getElementById('modelStatus');
    const messagesArea = document.getElementById('messagesArea');
    const userInput = document.getElementById('userInput');
    const sendButton = document.getElementById('sendButton');
    
    // Variable donde guardaremos el modelo activo
    let currentModel = null;
    let modelsList = [];
    let isReady = false;  // Indica si ya se cargaron los modelos

    // Funciones auxiliares de formato (igual que antes)
    function formatBotMessage(text) {
        const escapeHtml = (str) => {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        };
        let formatted = escapeHtml(text);
        formatted = formatted.replace(/\n/g, '<br>');
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        formatted = formatted.replace(urlRegex, function(url) {
            return `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color:#5a67d8; text-decoration:underline;">${url}</a>`;
        });
        return formatted;
    }

    function addMessage(text, sender, isHtml = false) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender === 'user' ? 'user-message' : 'bot-message');
        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        if (isHtml && sender === 'bot') {
            bubble.innerHTML = text;
        } else {
            bubble.textContent = text;
        }
        const timestamp = document.createElement('div');
        timestamp.classList.add('timestamp');
        const now = new Date();
        timestamp.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        messageDiv.appendChild(bubble);
        messageDiv.appendChild(timestamp);
        messagesArea.appendChild(messageDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
        return messageDiv;
    }

    // Indicador de escritura
    let typingElement = null;
    function showTyping() {
        if (typingElement) return;
        const typingDiv = document.createElement('div');
        typingDiv.classList.add('message', 'bot-message');
        typingDiv.id = 'typingIndicator';
        const indicator = document.createElement('div');
        indicator.classList.add('typing-indicator');
        indicator.innerHTML = '<span></span><span></span><span></span>';
        typingDiv.appendChild(indicator);
        messagesArea.appendChild(typingDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
        typingElement = typingDiv;
    }
    function hideTyping() {
        if (typingElement) {
            typingElement.remove();
            typingElement = null;
        }
    }

    // Función para preguntar usando el modelo actual
    async function askBot(question) {
        if (!question.trim()) return;
        if (!isReady || !currentModel) {
            addMessage("⚠️ Aún no se ha seleccionado un modelo. Espera a que cargue la lista y elige uno.", 'bot');
            return;
        }

        addMessage(question, 'user');
        userInput.value = '';
        userInput.disabled = true;
        sendButton.disabled = true;
        showTyping();

        try {
            const response = await puter.ai.chat(question, { model: currentModel });
            let botReply = '';
            if (typeof response === 'string') {
                botReply = response;
            } else if (response && response.message && response.message.content) {
                if (Array.isArray(response.message.content)) {
                    botReply = response.message.content.map(c => c.text || c).join('');
                } else {
                    botReply = response.message.content;
                }
            } else if (response && response.message) {
                botReply = response.message;
            } else {
                botReply = String(response);
            }
            hideTyping();
            const formatted = formatBotMessage(botReply || "Lo siento, no pude generar una respuesta.");
            addMessage(formatted, 'bot', true);
        } catch (error) {
            console.error(error);
            hideTyping();
            addMessage(`❌ Error con el modelo "${currentModel}": ${error.message || 'Intenta cambiar de modelo.'}`, 'bot');
        } finally {
            userInput.disabled = false;
            sendButton.disabled = false;
            userInput.focus();
        }
    }

    // Cargar lista de modelos desde puter.ai
    async function loadModels() {
        try {
            modelStatus.textContent = '📡 Obteniendo lista...';
            modelStatus.style.backgroundColor = "rgba(0,0,0,0.3)";
            // Llamada a la API de Puter para listar modelos
            const availableModels = await puter.ai.listModels();
            // availableModels suele ser un array de strings (nombres de modelo)
            if (!availableModels || availableModels.length === 0) {
                throw new Error("No se recibieron modelos");
            }
            modelsList = availableModels;
            // Limpiar select y llenar
            modelSelect.innerHTML = '';
            // Opcional: podemos filtrar o mostrar todos. Mostraremos todos.
            for (const modelName of modelsList) {
                const option = document.createElement('option');
                option.value = modelName;
                option.textContent = modelName;
                modelSelect.appendChild(option);
            }
            // Seleccionar por defecto un modelo popular si existe, si no el primero
            let defaultModel = modelsList.includes('gpt-4.1-nano') ? 'gpt-4.1-nano' : 
                               (modelsList.includes('claude-sonnet-4-5') ? 'claude-sonnet-4-5' : modelsList[0]);
            modelSelect.value = defaultModel;
            currentModel = defaultModel;
            modelSelect.disabled = false;
            userInput.disabled = false;
            sendButton.disabled = false;
            isReady = true;
            modelStatus.textContent = `✅ Listo · ${modelsList.length} modelos`;
            modelStatus.style.backgroundColor = "rgba(0,0,0,0.2)";
            // Mensaje de bienvenida específico
            addMessage(`✨ Modelos cargados. Actualmente usando: <strong>${currentModel}</strong>. Puedes cambiar el modelo en el selector superior. ¡Pregúntame lo que quieras!`, 'bot', true);
        } catch (error) {
            console.error("Error cargando modelos:", error);
            modelStatus.textContent = "⚠️ Error al cargar";
            modelStatus.style.backgroundColor = "#c53030";
            addMessage(`❌ No se pudo obtener la lista de modelos. Revisa tu conexión o si Puter.js está disponible. Error: ${error.message}`, 'bot');
            // Intentar un fallback manual con algunos modelos conocidos por si acaso
            const fallbackModels = ['gpt-4.1-nano', 'claude-sonnet-4-5', 'google/gemini-2.5-flash', 'deepseek/deepseek-r1'];
            modelSelect.innerHTML = '';
            for (const fb of fallbackModels) {
                const opt = document.createElement('option');
                opt.value = fb;
                opt.textContent = fb;
                modelSelect.appendChild(opt);
            }
            modelSelect.disabled = false;
            currentModel = fallbackModels[0];
            modelSelect.value = currentModel;
            isReady = true;
            userInput.disabled = false;
            sendButton.disabled = false;
            addMessage(`⚠️ Usando lista de respaldo. Modelo actual: ${currentModel}. Puedes cambiarlo.`, 'bot', true);
        }
    }

    // Evento cambio de modelo
    modelSelect.addEventListener('change', (e) => {
        if (modelSelect.disabled) return;
        const newModel = modelSelect.value;
        if (newModel && modelsList.includes(newModel)) {
            currentModel = newModel;
            addMessage(`🔄 Cambiando modelo a: <strong>${currentModel}</strong>. Las próximas respuestas usarán este modelo.`, 'bot', true);
        } else if (newModel && !modelsList.includes(newModel) && modelSelect.options.length > 0) {
            // Puede ocurrir si se selecciona un fallback manual
            currentModel = newModel;
            addMessage(`🔄 Modelo cambiado a: ${currentModel} (desde lista de respaldo).`, 'bot', true);
        }
        // Guardar en localStorage opcional
        try { localStorage.setItem('preferredModel', currentModel); } catch(e) {}
    });

    // Cargar modelo preferido guardado si existe
    function loadStoredModel() {
        try {
            const saved = localStorage.getItem('preferredModel');
            if (saved && modelsList.includes(saved)) {
                modelSelect.value = saved;
                currentModel = saved;
                addMessage(`📌 Se ha restaurado tu modelo preferido: ${currentModel}`, 'bot', true);
            }
        } catch(e) {}
    }

    // Eventos de envío
    sendButton.addEventListener('click', () => {
        const question = userInput.value.trim();
        if (question && isReady) askBot(question);
    });
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !userInput.disabled && isReady) {
            const question = userInput.value.trim();
            if (question) askBot(question);
        }
    });

    // Inicializar: cargar modelos y después restaurar preferencia
    (async function init() {
        await loadModels();
        // Después de cargar lista, restaurar si existe modelo guardado
        if (modelsList.length > 0) {
            try {
                const saved = localStorage.getItem('preferredModel');
                if (saved && modelsList.includes(saved)) {
                    modelSelect.value = saved;
                    currentModel = saved;
                    addMessage(`🔁 Modelo preferido cargado: ${currentModel}`, 'bot', true);
                }
            } catch(e) {}
        }
        // Guardar cuando se cambie manualmente
        modelSelect.addEventListener('change', () => {
            if (currentModel) {
                try { localStorage.setItem('preferredModel', currentModel); } catch(e) {}
            }
        });
    })();
</script>
</body>
</html>
